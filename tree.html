<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="tree-page">
    <header>
      <a class="back" href="index.html">← Home</a>
      <h1 id="page-title">Family Tree</h1>
    </header>
    <div class="tree-canvas" id="canvas">
      <svg id="tree-svg"></svg>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    // Layout sizes
    const R  = 30;  // circle radius
    const CO = 52;  // centre offset for each person in a couple
    const NS = 200; // horizontal spacing between nodes
    const LH = 120; // vertical spacing between generations

    // Colours
    const red  = '#dc2626';
    const grey = '#c9d0e3';
    const fg   = '#1a1d23';
    const bg   = '#ffffff';
    const bd   = '#dde2f0';

    function drawCircle(g, cx, name) {
      g.append('circle')
        .attr('cx', cx).attr('cy', 0).attr('r', R)
        .attr('fill', bg).attr('stroke', bd).attr('stroke-width', 2)
        .attr('filter', 'url(#shadow)');
      g.append('text')
        .attr('x', cx).attr('y', 0).attr('dy', '0.35em')
        .attr('text-anchor', 'middle')
        .attr('fill', fg).attr('font-size', 12).attr('font-weight', 600)
        .attr('font-family', 'Segoe UI, system-ui, sans-serif')
        .text(name);
    }

    function drawNode(g, d) {
      if (d.data.spouse) {
        drawCircle(g, -CO, d.data.name);
        drawCircle(g,  CO, d.data.spouse);
        g.append('line')
          .attr('x1', -CO + R).attr('x2', -9)
          .attr('y1', 0).attr('y2', 0)
          .attr('stroke', red).attr('stroke-width', 2);
        g.append('line')
          .attr('x1', 9).attr('x2', CO - R)
          .attr('y1', 0).attr('y2', 0)
          .attr('stroke', red).attr('stroke-width', 2);
        g.append('text')
          .attr('x', 0).attr('y', 0).attr('dy', '0.38em')
          .attr('text-anchor', 'middle')
          .attr('fill', red).attr('font-size', 14)
          .text('♥');
      } else {
        drawCircle(g, 0, d.data.name);
      }
    }

    function childX(d) {
      if (d.data.spouse && d.data.spouseHasOwnParents) return d.x - CO;
      return d.x;
    }

    function draw(treeData, mergeLinks = []) {
      // If multiple roots, layout each independently and place side by side
      const roots = treeData.id === '__root__' ? treeData.children : [treeData];
      const layouts = [];
      let cursor = 0;
      const GAP = 100;

      roots.forEach(rd => {
        const root = d3.hierarchy(rd, d => d.children?.length ? d.children : null);
        d3.tree().nodeSize([NS, LH])(root);

        let lx0 = Infinity, lx1 = -Infinity;
        root.each(d => { lx0 = Math.min(lx0, d.x); lx1 = Math.max(lx1, d.x); });

        const offsetX = cursor - lx0;
        root.each(d => { d.x += offsetX; });
        cursor += (lx1 - lx0) + NS + GAP;

        layouts.push({ root });
      });

      // Collect all nodes
      const nodePositions = {};
      const allNodes = [];
      layouts.forEach(l => {
        l.root.each(d => {
          nodePositions[d.data.id] = { x: d.x, y: d.y, data: d.data };
          if (d.data.spouseId) {
            nodePositions[d.data.spouseId] = { x: d.x, y: d.y, data: d.data, isSpouse: true };
          }
          allNodes.push(d);
        });
      });

      let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
      allNodes.forEach(d => {
        x0 = Math.min(x0, d.x); x1 = Math.max(x1, d.x);
        y0 = Math.min(y0, d.y); y1 = Math.max(y1, d.y);
      });

      const svg = d3.select('#tree-svg');

      const defs = svg.append('defs');
      const f = defs.append('filter').attr('id', 'shadow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
      f.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 3).attr('flood-color', 'rgba(0,0,0,0.08)');

      const g = svg.append('g');

      const svgEl = svg.node();
      const vw = svgEl.clientWidth || window.innerWidth;
      const vh = svgEl.clientHeight || window.innerHeight;
      const cx = (x0 + x1) / 2;
      const cy = (y0 + y1) / 2;
      const initTransform = d3.zoomIdentity.translate(vw / 2 - cx, vh / 2 - cy);

      const zoom = d3.zoom().scaleExtent([0.3, 2]).on('zoom', e => g.attr('transform', e.transform));
      svg.call(zoom).call(zoom.transform, initTransform);

      // Draw comb-style connectors: parent → vertical → horizontal bar → vertical drops
      const linkG = g.append('g');
      allNodes.forEach(parent => {
        if (!parent.children || parent.children.length === 0) return;
        const sy = parent.y + R;
        const ty = parent.children[0].y - R;
        const my = (sy + ty) / 2;

        // Vertical from parent center down to midpoint
        linkG.append('line')
          .attr('x1', parent.x).attr('x2', parent.x)
          .attr('y1', sy).attr('y2', my)
          .attr('stroke', grey).attr('stroke-width', 2);

        // Get child X positions (adjusted for couple primary side)
        const cxs = parent.children.map(c => childX(c));
        const minCx = Math.min(...cxs);
        const maxCx = Math.max(...cxs);

        // Horizontal bar spanning children
        linkG.append('line')
          .attr('x1', minCx).attr('x2', maxCx)
          .attr('y1', my).attr('y2', my)
          .attr('stroke', grey).attr('stroke-width', 2);

        // Vertical drops to each child
        parent.children.forEach(c => {
          const cxx = childX(c);
          linkG.append('line')
            .attr('x1', cxx).attr('x2', cxx)
            .attr('y1', my).attr('y2', ty)
            .attr('stroke', grey).attr('stroke-width', 2);
        });
      });

      // Draw merge links (spouse's parents → spouse circle in the couple node)
      // Route at 70% down (not 50%) so they don't overlap comb bars, and dash them
      mergeLinks.forEach(ml => {
        const source = nodePositions[ml.sourceId];
        const target = nodePositions[ml.targetPersonId];
        if (!source || !target) return;

        const sx = source.x;
        const sy = source.y + R;

        let tx = target.x;
        if (target.isSpouse) tx += CO;
        else if (target.data.spouse) tx -= CO;
        const ty = target.y - R;

        const my = sy + (ty - sy) * 0.7;
        g.append('path')
          .attr('fill', 'none').attr('stroke', grey).attr('stroke-width', 2)
          .attr('stroke-dasharray', '6,4')
          .attr('d', `M${sx},${sy} V${my} H${tx} V${ty}`);
      });

      g.append('g').selectAll('g').data(allNodes).join('g')
        .attr('transform', d => `translate(${d.x},${d.y})`)
        .each(function(d) { drawNode(d3.select(this), d); });
    }

    // Converts the flat graph (nodes/couples/parentOf) into a nested tree for D3
    function parseGraph(data) {
      const nodeMap = Object.fromEntries(data.nodes.map(n => [n.id, n]));

      // id → spouse id
      const spouseOf = {};
      data.couples.forEach(({ a, b }) => { spouseOf[a] = b; spouseOf[b] = a; });

      // sorted couple key → [child ids]
      const childrenOf = {};
      data.parentOf.forEach(({ parents, children }) => {
        const key = [...parents].sort().join('+');
        (childrenOf[key] ??= []).push(...children);
      });

      // Track who is a child (has parents)
      const isChild = new Set(data.parentOf.flatMap(p => p.children));

      // Identify couples where both members have parents (merge points)
      // In such cases, the spouse's lineage is shown separately, not inlined
      const bothHaveParents = new Set();
      data.couples.forEach(({ a, b }) => {
        if (isChild.has(a) && isChild.has(b)) {
          bothHaveParents.add(a);
          bothHaveParents.add(b);
        }
      });

      // Pre-claim spouses of children so they don't appear as roots
      // But DON'T claim spouses who also have their own parents (they merge, not duplicate)
      const claimed = new Set();
      isChild.forEach(id => { 
        const spouseId = spouseOf[id];
        if (spouseId && !isChild.has(spouseId)) {
          claimed.add(spouseId); 
        }
      });

      // Root = not a child and not already claimed as someone's spouse
      const roots = data.nodes.filter(n => {
        if (isChild.has(n.id) || claimed.has(n.id)) return false;
        const spouseId = spouseOf[n.id];
        if (spouseId && !isChild.has(spouseId)) claimed.add(spouseId);
        return true;
      });

      // Track which nodes we've built to avoid duplicates
      const built = new Set();
      const mergeLinks = [];

      function buildNode(id) {
        if (built.has(id)) return null;
        built.add(id);
        
        const spouseId = spouseOf[id];
        
        // If spouse also has parents, they're part of same tree via merge
        // Don't inline them as spouse - they appear via their own parent branch
        // But they share children
        const spouseHasOwnParents = spouseId && bothHaveParents.has(spouseId);
        
        // Mark spouse as built too (to prevent duplicate)
        if (spouseId) built.add(spouseId);
        
        const key = spouseId ? [id, spouseId].sort().join('+') : id;
        const childIds = childrenOf[key] ?? [];
        
        // Build children, filtering out nulls (already built nodes)
        const children = childIds.map(buildNode).filter(Boolean);
        
        return {
          id,
          name: nodeMap[id].name,
          spouse: spouseId ? nodeMap[spouseId].name : null,
          spouseId: spouseId || null,
          spouseHasOwnParents,
          children: children.length > 0 ? children : undefined
        };
      }

      // For multi-root trees (like when both grandparent couples exist)
      // we need to unify them under an invisible root
      const rootNodes = [];
      roots.forEach(r => {
        const node = buildNode(r.id);
        if (node) {
          rootNodes.push(node);
          // Check if any expected children were already built via the other lineage.
          // Create merge links for those skipped children.
          const spouseId = spouseOf[r.id];
          const key = spouseId ? [r.id, spouseId].sort().join('+') : r.id;
          const expectedChildren = childrenOf[key] ?? [];
          const actualChildren = new Set((node.children ?? []).map(c => c.id));
          expectedChildren.forEach(cid => {
            if (!actualChildren.has(cid)) {
              mergeLinks.push({ sourceId: r.id, targetPersonId: cid });
            }
          });
        }
      });

      const tree = rootNodes.length === 1
        ? rootNodes[0]
        : { id: '__root__', name: null, children: rootNodes };

      return { tree, mergeLinks };
    }

    const family = new URLSearchParams(location.search).get('family');
    fetch(`${family}.json`)
      .then(r => r.json())
      .then(data => {
        document.title = data.title;
        document.getElementById('page-title').textContent = data.title;
        const { tree, mergeLinks } = parseGraph(data);
        draw(tree, mergeLinks);
      });
  </script>

</body>
</html>
