<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="tree-page">
    <header>
      <a class="back" href="index.html">← Home</a>
      <h1 id="page-title">Family Tree</h1>
    </header>
    <div class="tree-canvas">
      <div id="tree-root"></div>
    </div>
  </div>

  <script>
    // ── Build DOM for one tree node ────────────────────────────
    // Each node: { name, spouse?, children? }
    //   spouse  → shown next to the node with a red marriage line
    //   children → rendered below, connected with branch lines
    function buildNode(node) {
      const hasChildren = node.children && node.children.length > 0;

      const wrap = document.createElement('div');
      wrap.className = 'tree-node' + (hasChildren ? ' has-children' : '');

      const box = document.createElement('div');
      box.className = 'node-box';

      if (node.spouse) {
        // Married couple: two pills joined by a red line
        const pair = document.createElement('div');
        pair.className = 'couple-pair';

        const p1 = document.createElement('div');
        p1.className = 'node-label';
        p1.textContent = node.name;

        const line = document.createElement('div');
        line.className = 'marriage-line';

        const p2 = document.createElement('div');
        p2.className = 'node-label';
        p2.textContent = node.spouse;

        pair.append(p1, line, p2);
        box.appendChild(pair);
      } else {
        const label = document.createElement('div');
        label.className = 'node-label';
        label.textContent = node.name;
        box.appendChild(label);
      }

      wrap.appendChild(box);

      // Recursively build children
      if (hasChildren) {
        const row = document.createElement('div');
        row.className = 'children-row';

        node.children.forEach(child => {
          const col = document.createElement('div');
          col.className = 'child-col';
          col.appendChild(buildNode(child));
          row.appendChild(col);
        });

        wrap.appendChild(row);
      }

      return wrap;
    }

    // ── Load data and render ───────────────────────────────────
    const family = new URLSearchParams(window.location.search).get('family');

    fetch(`${family}.json`)
      .then(r => r.json())
      .then(data => {
        document.title = data.title;
        document.getElementById('page-title').textContent = data.title;
        document.getElementById('tree-root').appendChild(buildNode(data.root));
      })
      .catch(() => {
        document.getElementById('tree-root').innerHTML =
          '<p class="status-msg">Could not load family data.</p>';
      });
  </script>

</body>
</html>
